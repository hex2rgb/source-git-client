services:
  filebrowser:
    image: filebrowser/filebrowser
    container_name: smba-fs-web
    restart: unless-stopped
    user: "1000:100"
    ports:
      - "58080:80"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - /mnt/user/outerdir/workspace:/srv
      - /mnt/user/appdata/filebrowser/database:/database
      - /mnt/user/appdata/filebrowser/config:/config

  samba:
    image: dperson/samba
    container_name: smba-fs
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "55445:445/tcp"
    environment:
      TZ: Asia/Shanghai
      WORKGROUP: WORKGROUP
    volumes:
      - /mnt/user/outerdir/workspace:/mount
    command: >-
      -u "unraidsmb;111111;1000;users;100"
      -s "outerdir;/mount;no;no;no;unraidsmb;unraidsmb"