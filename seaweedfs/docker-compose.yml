services:
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: z-my-seaweedfs
    ports:
      - "29333:9333"
      - "28080:8080"
      - "28888:8888" # Web 文件管理界面
    volumes:
      - /mnt/user/alone/seaweedfs_data:/data
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
    command: server -dir=/data
    networks:
      - my-service-net

networks:
  my-service-net:
    external: true
